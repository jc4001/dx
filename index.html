<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PAL MAS EXPONTANEO Y TIERNO </title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: linear-gradient(to right, #6d090d, #fad0c4);
            color: white;
            margin: 0;
            padding: 20px;
        }

        h1 {
            margin-top: 20px;
        }

        .galeria {
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* 4 columnas fijas */
            gap: 15px;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto; /* Centra la galería en la pantalla */
        }

        .galeria img {
            width: 100%;
            height: 250px; /* Define una altura fija para nivelar todas las fotos */
            object-fit: cover; /* Recorta y ajusta la foto para que no se deforme ni estire */
            border-radius: 10px;
            transition: transform 0.3s;
        }

        .galeria img:hover {
            transform: scale(1.05);
        }

        button {
            padding: 15px 25px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            background-color: white;
            color: #5c3237;
            cursor: pointer;
            margin-top: 20px;
            font-weight: bold;
        }

        #mensaje {
            margin-top: 25px;
            font-size: 22px;
            display: none;
            line-height: 1.6;
            padding: 0 20px;
        }
    </style>
</head>
<body>

    <h1>pal mas expontaneo</h1>

    <!-- 🎵 Música -->
    <audio id="musica" loop>
        <source src="Billie Eilish - _ocean eyes (Video Oficial) _ Español + Lyrics [mO3CcZJGncw].mp3" type="audio/mpeg">
    </audio>

    <!-- 📸 Galería -->
    <div class="galeria">
        <img src="FOTOS/imagen 1.jpg.jpeg">
        <img src="FOTOS/imagen 2.jpg (2).jpeg">
        <img src="FOTOS/imagen3.jpg.jpeg">
        <img src="FOTOS/imagen 4.jpg.jpeg">
        <img src="FOTOS/imagen 5.jpg.jpeg">
        <img src="FOTOS/imagen6.jpg.jpeg">
        <img src="FOTOS/imagen7.jpg (2).jpeg">
        <img src="FOTOS/imagen8.jpg.jpeg">
    </div>

    <!-- 💖 Botón -->
    <button onclick="mostrarMensaje()">Haz clic aquí :3</button>

    <!-- 💌 Mensaje -->
    <p id="mensaje">
    En el poco tiempo q te conozco pude ver q eres un chico lindo 
    tanto emocional como fisicamente y muy poco se ve eso hoy en dia
    espero nunca cambies tu forma de ser 
    </p>

    <!-- ⚙️ Script -->
    <script>
        function mostrarMensaje() {
            document.getElementById("mensaje").style.display = "block";
            document.getElementById("musica").play();
        }
    </script>

</body>
</html>
